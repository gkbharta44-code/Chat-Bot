<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Delper Ecom – DPR Transaction Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy-mid:#13223A;--navy-card:#192D4A;--navy-deep:#08101E;
  --gold:#C8970A;--gold-light:#F0B429;--teal:#00C2A8;--teal-dim:#00A18B;
  --red:#FF4D6D;--white:#F4F8FF;--muted:#8FA3C0;--border:rgba(255,255,255,0.08);
  --radius:14px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);font-size:15px;line-height:1.6;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:860px;margin:0 auto;box-shadow:0 0 60px rgba(0,194,168,0.06)}

/* HEADER */
.app-header{background:linear-gradient(135deg,#0B1628 0%,#0E2040 70%,#0B2530 100%);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative;overflow:hidden}
.app-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 80% -20%,rgba(0,194,168,0.10),transparent);pointer-events:none}
.bot-avatar{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--teal),var(--gold));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;z-index:1}
.header-info{flex:1;z-index:1}
.header-info h1{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700}
.header-info p{font-size:11px;color:var(--muted);margin-top:1px}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22C55E;margin-right:4px;box-shadow:0 0 5px #22C55E}
.lang-wrap{z-index:1}
.lang-wrap select{background:var(--navy-card);border:1px solid rgba(0,194,168,0.3);color:var(--teal);border-radius:8px;padding:5px 8px;font-size:11px;font-weight:600;cursor:pointer;outline:none;font-family:'Inter',sans-serif;max-width:155px}

/* REGISTRATION */
.reg-panel{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:16px 18px;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 70px)}
.reg-panel h2{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--teal);margin-bottom:12px;letter-spacing:0.3px}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.reg-field{display:flex;flex-direction:column;gap:3px}
.reg-field.full{grid-column:1/-1}
.reg-field label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase}
.reg-field input,.reg-field select{background:var(--navy-card);border:1px solid var(--border);color:var(--white);border-radius:7px;padding:8px 11px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;width:100%}
.reg-field input::placeholder{color:var(--muted)}
.reg-field input:focus,.reg-field select:focus{border-color:var(--teal)}
.reg-field input.err{border-color:var(--red)!important}
.phone-row{display:flex;gap:5px}
.phone-row select{flex:0 0 115px;background:var(--navy-card);border:1px solid var(--border);color:var(--white);border-radius:7px;padding:8px 5px;font-size:12px;font-family:'Inter',sans-serif;outline:none}
.phone-row input{flex:1}
.start-btn{margin-top:12px;width:100%;background:linear-gradient(135deg,var(--teal),var(--teal-dim));border:none;border-radius:9px;padding:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.2s,transform 0.15s;letter-spacing:0.3px}
.start-btn:hover{opacity:0.88;transform:translateY(-1px)}
.reg-panel.hidden{display:none}

/* USER BAR */
.user-bar{background:rgba(0,194,168,0.06);border-bottom:1px solid rgba(0,194,168,0.12);padding:7px 18px;display:flex;align-items:center;gap:6px;flex-shrink:0;font-size:11px;color:var(--muted);flex-wrap:wrap}
.user-bar strong{color:var(--white);font-weight:600}
.user-bar .sep{color:rgba(255,255,255,0.15)}
.user-bar.hidden{display:none}

/* STAGE TRACKER */
.stage-bar{padding:11px 18px;background:var(--navy-deep);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.stage-bar.hidden{display:none}
.stages{display:flex;align-items:center;min-width:max-content}
.stage{display:flex;align-items:center;gap:5px}
.stage{cursor:pointer;padding:4px 6px;border-radius:8px;transition:background 0.15s}
.stage:hover{background:rgba(255,255,255,0.05)}
.stage-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);background:var(--navy-card);transition:all 0.3s;flex-shrink:0}
.stage.done .stage-dot{background:var(--teal);border-color:var(--teal);color:#fff}
.stage.active .stage-dot{background:var(--gold);border-color:var(--gold-light);color:#fff;box-shadow:0 0 10px rgba(240,180,41,0.35)}
.stage-label{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:0.3px;white-space:nowrap}
.stage.done .stage-label{color:var(--teal)}
.stage.active .stage-label{color:var(--gold-light)}
.stage-line{width:22px;height:2px;background:var(--border);flex-shrink:0;margin:0 2px;transition:background 0.3s}

/* CHAT */
.chat-window{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-window::-webkit-scrollbar{width:4px}
.chat-window::-webkit-scrollbar-thumb{background:var(--navy-card);border-radius:4px}

.msg{display:flex;gap:8px;align-items:flex-end;max-width:84%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.msg.bot .msg-av{background:linear-gradient(135deg,var(--teal),var(--teal-dim));color:#fff}
.msg.user .msg-av{background:linear-gradient(135deg,var(--gold),#9a6e08);color:#fff}
.msg-bub{padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.65;max-width:100%}
.msg.bot .msg-bub{background:var(--navy-card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--white)}
.msg.user .msg-bub{background:linear-gradient(135deg,var(--teal-dim),#007A68);border-bottom-right-radius:4px;color:#fff}
.msg-time{font-size:10px;color:var(--muted);margin-top:3px}
.msg.bot .msg-time{text-align:left}
.msg.user .msg-time{text-align:right}
.msg-col{display:flex;flex-direction:column}

/* QUICK REPLIES */
.qr-wrap{display:flex;flex-wrap:wrap;gap:7px;padding:0 18px 12px;flex-shrink:0}
.qr-btn{background:var(--navy-card);border:1px solid rgba(0,194,168,0.28);color:var(--teal);border-radius:18px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;white-space:nowrap}
.qr-btn:hover{background:rgba(0,194,168,0.1);border-color:var(--teal)}

/* INPUT */
.input-bar{padding:12px 14px;background:var(--navy-mid);border-top:1px solid var(--border);display:flex;gap:9px;align-items:flex-end;flex-shrink:0}
.input-bar.hidden{display:none}
.input-bar textarea{flex:1;background:var(--navy-card);border:1px solid var(--border);color:var(--white);border-radius:11px;padding:10px 13px;font-size:13.5px;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:42px;max-height:110px;line-height:1.5;transition:border-color 0.2s}
.input-bar textarea::placeholder{color:var(--muted)}
.input-bar textarea:focus{border-color:var(--teal)}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,var(--teal),var(--teal-dim));border:none;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s,transform 0.15s;font-size:17px;color:#fff}
.send-btn:hover{opacity:0.88;transform:scale(1.05)}
.send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}

/* END BAR */
.end-bar{padding:9px 16px;background:var(--navy-deep);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.end-bar.hidden{display:none}
.end-btn{background:rgba(255,77,109,0.10);border:1px solid rgba(255,77,109,0.28);color:var(--red);border-radius:7px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
.end-btn:hover{background:rgba(255,77,109,0.20)}
.sid{font-size:10px;color:var(--muted)}

/* TYPING */
.typing{display:flex;gap:4px;align-items:center;padding:11px 15px;background:var(--navy-card);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bop 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-ov.hidden{display:none}
.modal{background:var(--navy-mid);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:380px;width:100%;text-align:center}
.modal h2{font-family:'Space Grotesk',sans-serif;font-size:19px;margin-bottom:8px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.modal .hi{color:var(--teal);font-weight:600}
.modal-btn{background:linear-gradient(135deg,var(--teal),var(--teal-dim));border:none;border-radius:9px;padding:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;width:100%}
.modal-icon{font-size:40px;margin-bottom:10px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy-card);border:1px solid var(--teal);color:var(--white);padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;z-index:1000;transform:translateY(50px);opacity:0;transition:all 0.3s;pointer-events:none;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{border-color:var(--red);color:var(--red)}

@media(max-width:580px){
  .reg-grid{grid-template-columns:1fr}
  .reg-field.full{grid-column:1}
  .lang-wrap select{max-width:115px;font-size:10px}
  .chat-window{padding:12px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="bot-avatar">🤖</div>

    <h1>Delper Ecom · DPR Transaction Assistant</h1>

  <div class="lang-wrap">
    <select id="langSel" title="Select language"></select>
  </div>
</div>

<!-- REGISTRATION -->
<div class="reg-panel" id="regPanel">
  <h2>👤 Register to Begin Your DPR Transaction Journey</h2>
  <div class="reg-grid">
    <div class="reg-field">
      <label>Full Name</label>
      <input type="text" id="rn" placeholder="e.g. Rajesh Kumar" autocomplete="name"/>
    </div>
    <div class="reg-field">
      <label>Country</label>
      <select id="rc"></select>
    </div>
    <div class="reg-field full">
      <label>Phone Number</label>
      <div class="phone-row">
        <select id="rd"></select>
        <input type="tel" id="rp" placeholder="e.g. 9876543210"/>
      </div>
    </div>
    <div class="reg-field full">
      <label>Email Address</label>
      <input type="email" id="re" placeholder="e.g. rajesh@example.com" autocomplete="email"/>
    </div>
  </div>
  <button class="start-btn" onclick="startChat()">🚀 Start Chat</button>
</div>

<!-- USER BAR -->
<div class="user-bar hidden" id="userBar"></div>

<!-- STAGE TRACKER -->
<div class="stage-bar hidden" id="stageBar">
  <div class="stages" id="stagesEl"></div>
</div>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWin"></div>

<!-- QUICK REPLIES -->
<div class="qr-wrap" id="qrWrap"></div>

<!-- INPUT BAR -->
<div class="input-bar hidden" id="inputBar">
  <textarea id="msgIn" placeholder="Type your message…" rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="doSend()">➤</button>
</div>

<!-- END BAR -->
<div class="end-bar hidden" id="endBar">
  <span class="sid" id="sidEl"></span>
  <button class="end-btn" onclick="endChat()">🔚 End Chat &amp; Send Transcript</button>
</div>

</div><!-- /app -->

<!-- MODAL -->
<div class="modal-ov hidden" id="modal">
  <div class="modal">
    <div class="modal-icon">✅</div>
    <h2>Transcript Sent!</h2>
    <p>Your full chat transcript has been prepared.<br/>
    A copy has been sent to <span class="hi">gkbharta44@gmail.com</span><br/>
    and <span class="hi" id="modalEmail"></span>.</p>
    <button class="modal-btn" onclick="location.reload()">Start New Session</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

function getMsg(key, arg) {
  const lang = S.lang;
  const block = T[key];
  if (!block) return "";
  const fn = block[lang] || block["default"] || block["English"];
  return fn ? fn(arg) : "";
}

  "contact": () => `📞 <strong>Support:</strong>\n• Email: info@delperecom.com\n• WhatsApp/Phone: +91 6361 888 254\n• Website: www.delperecom.com\n• Marketplace: marketplace.delperecom.com`,
  "lock": () => `🔒 <strong>Lock-up Period:</strong>\n• DPR tokens: Held for 60 months (5 years) before open-market sale\n• ETH/passive rewards: Accessible from Month 10 onward\n• POS Redemption: Tokens can be spent at any partnered merchant at any time`,
};

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let S = {
  user: null, lang: "English",
  flowStep: -1,   // -1 = greeting shown, 0..7 = flow stages
  history: [],    // [{who,text,time}]
  sessionId: "DPR-" + Date.now().toString(36).toUpperCase(),
  busy: false,
};

// ═══════════════════════════════════
// INIT DOM
// ═══════════════════════════════════
(function domInit(){
  // Langs
  const ls = document.getElementById("langSel");
  LANGS.forEach(([v,l])=>{ const o=document.createElement("option"); o.value=v; o.textContent=l; ls.appendChild(o); });
  ls.addEventListener("change",e=>{ S.lang=e.target.value; });

  // Countries
  const cs=document.getElementById("rc"), ds=document.getElementById("rd");
  CTRIES.sort((a,b)=>a.n.localeCompare(b.n)).forEach(c=>{
    const o1=document.createElement("option"); o1.value=c.n; o1.textContent=c.n;
    if(c.n==="India") o1.selected=true;
    cs.appendChild(o1);
    const o2=document.createElement("option"); o2.value=c.d;
    o2.textContent=c.d+" ("+c.n.substring(0,3)+")";
    if(c.n==="India") o2.selected=true;
    ds.appendChild(o2);
  });
  cs.addEventListener("change",()=>{ const f=CTRIES.find(c=>c.n===cs.value); if(f) ds.value=f.d; });

  // Stages — build with click handlers for banner navigation
  const se=document.getElementById("stagesEl");
  STAGES.forEach((s,i)=>{
    const d=document.createElement("div"); d.className="stage"+(i===0?" active":""); d.id="stg"+i;
    d.innerHTML=`<div class="stage-dot">${i+1}</div><div class="stage-label">${s}</div>`;
    d.style.cursor="pointer";
    d.title="Jump to: "+s;
    d.addEventListener("click",()=>navigateToStage(i));
    se.appendChild(d);
    if(i<STAGES.length-1){ const l=document.createElement("div"); l.className="stage-line"; l.id="sln"+i; se.appendChild(l); }
  });

  document.getElementById("sidEl").textContent="Session: "+S.sessionId;
})();

// ═══════════════════════════════════
// VALIDATION & START
// ═══════════════════════════════════
function startChat(){
  const name=document.getElementById("rn").value.trim();
  const country=document.getElementById("rc").value;
  const dial=document.getElementById("rd").value;
  const phone=document.getElementById("rp").value.trim();
  const email=document.getElementById("re").value.trim();
  let ok=true;
  ["rn","rp","re"].forEach(id=>document.getElementById(id).classList.remove("err"));
  if(!name){ document.getElementById("rn").classList.add("err"); ok=false; }
  if(!phone||!/^\d{4,15}$/.test(phone)){ document.getElementById("rp").classList.add("err"); ok=false; }
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ document.getElementById("re").classList.add("err"); ok=false; }
  if(!ok){ toast("Please fill all fields correctly.","err"); return; }

  S.user={ name, country, phone:dial+" "+phone, email };
  S.lang=document.getElementById("langSel").value;

  document.getElementById("regPanel").classList.add("hidden");
  document.getElementById("userBar").classList.remove("hidden");
  document.getElementById("stageBar").classList.remove("hidden");
  document.getElementById("inputBar").classList.remove("hidden");
  document.getElementById("endBar").classList.remove("hidden");

  const ub=document.getElementById("userBar");
  ub.innerHTML=`<strong>${name}</strong><span class="sep">·</span>${country}<span class="sep">·</span>${dial} ${phone}<span class="sep">·</span>${email}`;

  setStage(0);
  // Show greeting with simulated delay
  showTyping();
  setTimeout(()=>{
    hideTyping();
    const msg = getMsg("greet", S.user);
    addBotMsg(msg);
    setQR(["Tell me about DPR","How does the transaction work?","What is the ETH pool?","Show me the token price"]);
  }, 900);
}

// ═══════════════════════════════════
// STAGE UI
// ═══════════════════════════════════
function setStage(idx){
  STAGES.forEach((_,i)=>{
    const el=document.getElementById("stg"+i);
    if(!el) return;
    el.className="stage"+(i<idx?" done":(i===idx?" active":""));
    if(i<STAGES.length-1){
      const ln=document.getElementById("sln"+i);
      if(ln) ln.style.background=i<idx?"var(--teal)":"var(--border)";
    }
  });
}

// ═══════════════════════════════════
// MESSAGE HANDLING
// ═══════════════════════════════════
function addBotMsg(html){
  const t=now();
  const w=document.getElementById("chatWin");
  const d=document.createElement("div"); d.className="msg bot";
  d.innerHTML=`<div class="msg-av">🤖</div><div class="msg-col"><div class="msg-bub">${html}</div><div class="msg-time">${t}</div></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
  S.history.push({who:"bot",text:html.replace(/<[^>]+>/g,""),time:t});
}

function addUserMsg(text){
  const t=now();
  const w=document.getElementById("chatWin");
  const av=S.user.name[0].toUpperCase();
  const d=document.createElement("div"); d.className="msg user";
  d.innerHTML=`<div class="msg-av">${av}</div><div class="msg-col"><div class="msg-bub">${text}</div><div class="msg-time">${t}</div></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
  S.history.push({who:"user",text,time:t});
}

let typingEl=null;
function showTyping(){
  if(typingEl) return;
  const w=document.getElementById("chatWin");
  const d=document.createElement("div"); d.className="msg bot"; d.id="typingEl";
  d.innerHTML=`<div class="msg-av">🤖</div><div class="msg-col"><div class="typing"><span></span><span></span><span></span></div></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
  typingEl=d; document.getElementById("sendBtn").disabled=true;
}
function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } document.getElementById("sendBtn").disabled=false; }

function setQR(items){
  const el=document.getElementById("qrWrap"); el.innerHTML="";
  items.forEach(r=>{ const b=document.createElement("button"); b.className="qr-btn"; b.textContent=r; b.onclick=()=>handleInput(r); el.appendChild(b); });
}

// ═══════════════════════════════════
// INPUT
// ═══════════════════════════════════
function doSend(){ const ta=document.getElementById("msgIn"); const t=ta.value.trim(); if(!t||S.busy) return; ta.value=""; ta.style.height="auto"; handleInput(t); }
function onKey(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); doSend(); } }
function autoResize(el){ el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,110)+"px"; }

// ═══════════════════════════════════
// CORE LOGIC — no external API
// ═══════════════════════════════════
function handleInput(text){
  if(S.busy) return;
  S.busy=true;
  document.getElementById("qrWrap").innerHTML="";
  addUserMsg(text);
  showTyping();

  // Simulate thinking delay
  const delay = 600 + Math.random()*700;
  setTimeout(()=>{
    hideTyping();
    const response = generateResponse(text.toLowerCase());
    addBotMsg(response.msg);
    if(response.stage!==undefined) setStage(response.stage);
    if(response.qr) setQR(response.qr);
    S.busy=false;
  }, delay);
}

function generateResponse(input){
  // Check FAQ keywords first
  for(const [kw, fn] of Object.entries(FAQ)){
    if(input.includes(kw)) return { msg:fn(), qr: currentQR() };
  }

  // Determine which flow step to advance to
  // If user says yes/continue/next/proceed → advance flow
  const isAdvance = /yes|continue|next|proceed|ok|sure|ready|go|start|begin|agree|understand|got it|understood|yep|yeah/.test(input);

  // Try to detect stage from keywords
  let detected = -1;
  for(const [key, words] of Object.entries(KEYWORDS)){
    if(words.some(w=>input.includes(w))){ detected = Object.keys(KEYWORDS).indexOf(key); break; }
  }

  // Advance logic
  let nextStep = S.flowStep;
  if(isAdvance && S.flowStep < FLOW.length-1){ nextStep = S.flowStep+1; }
  else if(detected >= 0 && detected !== S.flowStep){ nextStep = detected; }
  else if(S.flowStep < 0){ nextStep = 0; } // First interaction after greeting

  if(nextStep === S.flowStep && S.flowStep >= 0){
    // Same stage — give contextual help
    return contextHelp(input, S.flowStep);
  }

  S.flowStep = nextStep;
  if(nextStep < 0) nextStep = 0;

  const step = FLOW[Math.min(nextStep, FLOW.length-1)];
  const msg = getMsg(step.key, S.user);
  return { msg, stage: step.stage-1, qr: step.qr };
}

function contextHelp(input, step){
  // Stage-specific contextual help for repeated questions
  const helps = [
    // Stage 0: overview
    [["earn","how much"], () => `💰 On a standard $247 transaction, you earn <strong>2.94 DPR tokens</strong> worth ~$720 at launch price, projected to reach ~$963 at Year-5 price ($327.40).\n\nSupply chain tiers also each earn their own individual DPR by watching ads and answering surveys on Delper.`],
    // Stage 1: kyc
    [["time","long","fast"], () => `⏱️ KYC typically takes <strong>2–5 minutes</strong> for automated verification via Jumio. Complex cases may take up to 24 hours for manual review.`],
    // Stage 2: wallet
    [["currency","support"], () => `🌍 Your wallet supports <strong>38 fiat currencies</strong> (USD, EUR, INR, AED, SGD, GBP, MYR, and more) and <strong>31 cryptocurrencies</strong> including BTC, ETH, USDT, USDC.`],
    // Stage 3: purchase
    [["when","sell","lock"], () => `🔒 DPR tokens are locked for <strong>60 months (5 years)</strong> before open-market sale. However:\n• ETH/passive rewards → accessible from Month 10\n• POS redemption → anytime at partnered merchants`],
    // Stage 4: split
    [["fee","charge","cost"], () => `💳 The platform charges <strong>0.5% per event</strong> (earn and redeem). On a $247 transaction, the fee is ~$1.24. Of that, 80% ($0.99) goes to the ETH Stability Pool and 20% ($0.25) to platform revenue.`],
    // Stage 5: chain
    [["supply","partner","sap","sc","tier","earn","ads","survey"], () => `🏭 <strong>How Supply Chain Tiers Earn DPR:</strong>\n\nEach of the 6 tiers (Consumer, Distributor, Manufacturer, Processor, Wholesaler, Raw Material Supplier) earns its <strong>own individual DPR reward</strong> on the Delper platform by:\n• Watching ads (₹12/min × up to 180 min/day)\n• Answering surveys\n\nDPR also acts as the <strong>medium of exchange</strong> between tiers for trade settlement. The platform earns <strong>0.5% buy charge + 0.5% sell charge</strong> on every DPR trade between participants.`],
    // Stage 6: confirm
    [["fee","total"], () => `📊 Transaction confirmation breakdown:\n• Amount: $247.00\n• Ad discount (25%): -$61.75\n• DPR earned (75%): 2.94 tokens\n• Platform fee (0.5%): $1.24\n• ETH pool (80% of fee): $0.99`],
    // Stage 7: complete
    [["support","contact","help"], () => `📞 <strong>Delper Ecom Support:</strong>\n• Email: info@delperecom.com\n• WhatsApp: +91 6361 888 254\n• Website: www.delperecom.com\n• Hours: 24/7 via email; business hours for phone`],
  ];

  const stepHelps = helps[Math.min(step, helps.length-1)] || [];
  for(const [kws, fn] of stepHelps){
    if(kws.some(k=>input.includes(k))) return { msg:fn(), qr:currentQR() };
  }

  // Generic fallback
  const fallbacks = [
    `I'm here to help! Could you clarify your question about this stage? Or type <strong>"next"</strong> to continue to the next step.`,
    `Great question! Let me know which part you'd like me to explain further, or say <strong>"continue"</strong> to move forward.`,
    `I understand. For more specific details, feel free to ask about the token price, fees, KYC, or wallet setup. Or say <strong>"next"</strong> to proceed.`,
  ];
  return { msg: fallbacks[Math.floor(Math.random()*fallbacks.length)], qr:currentQR() };
}

function currentQR(){
  const step = Math.max(0, Math.min(S.flowStep, QR.length-1));
  return QR[step];
}

// ═══════════════════════════════════
// STAGE BANNER NAVIGATION
// ═══════════════════════════════════
function navigateToStage(stageIndex){
  // Only work after chat has started (user is registered)
  if(!S.user) return;
  if(S.busy) return;

  // Map stage index → FLOW entry
  // FLOW is ordered: overview(0) kyc(1) wallet(2) purchase(3) split(4) confirm(5) complete(6)
  const flowIndex = stageIndex; // 1:1 mapping after chain removal
  const step = FLOW[Math.min(flowIndex, FLOW.length-1)];

  S.busy=true;
  document.getElementById("qrWrap").innerHTML="";

  // Show as user "navigating" without adding a user message
  showTyping();
  setTimeout(()=>{
    hideTyping();
    S.flowStep = flowIndex;
    const msg = getMsg(step.key, S.user);
    addBotMsg(msg);
    setStage(step.stage-1);
    setQR(step.qr);
    S.busy=false;
  }, 400 + Math.random()*300);
}


// ═══════════════════════════════════
// END CHAT
// ═══════════════════════════════════
function endChat(){
  setStage(6);
  const transcript = buildTranscript();
  // Download as .txt
  const blob=new Blob([transcript],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="DPR-Transcript-"+S.sessionId+".txt"; a.click();

  // Open mailto with transcript summary
  const subj=encodeURIComponent("DPR Chat Transcript – "+S.user.name+" – "+S.sessionId);
  const body=encodeURIComponent(transcript.substring(0,1800)+"...\n\n[Full transcript downloaded as .txt file]");
  const mailtoLink="mailto:gkbharta44@gmail.com?cc="+encodeURIComponent(S.user.email)+"&subject="+subj+"&body="+body;

  // Open mailto (works in most email clients)
  const mailWin=window.open(mailtoLink,"_blank");
  if(!mailWin) window.location.href=mailtoLink;

  document.getElementById("modalEmail").textContent=S.user.email;
  document.getElementById("modal").classList.remove("hidden");
  toast("📥 Transcript downloaded + email client opened!");
}

function buildTranscript(){
  const u=S.user;
  let t=`DELPER ECOM – DPR TRANSACTION CHAT TRANSCRIPT
============================================
Session ID : ${S.sessionId}
Date/Time  : ${new Date().toLocaleString()}
Language   : ${S.lang}

CUSTOMER DETAILS
────────────────
Name    : ${u.name}
Country : ${u.country}
Phone   : ${u.phone}
Email   : ${u.email}

Stage Reached: ${STAGES[Math.min(S.flowStep,6)]} (${Math.min(S.flowStep+1,7)} of 7)

CHAT TRANSCRIPT
────────────────\n`;
  S.history.forEach(m=>{
    const who=m.who==="bot"?"DPR Assistant":"Customer ("+u.name+")";
    t+=`[${m.time}] ${who}:\n${m.text}\n\n`;
  });
  t+=`────────────────
Delper Ecom Pvt Ltd | info@delperecom.com | +91 6361 888 254
www.delperecom.com | CryptoCard Global | June 2026 | Confidential`;
  return t;
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function now(){ return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
function toast(msg,type=""){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show"+(type?" "+type:"");
  setTimeout(()=>{ t.className="toast"; },4000);
}
</script>
